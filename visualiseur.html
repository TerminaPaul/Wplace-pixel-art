<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Wplace Pixel Visualiseur</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }

  h1 {
    font-size: 1.2rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 30px;
  }

  .controls {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  label {
    background: #111;
    border: 1px solid #222;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: #aaa;
    transition: all 0.2s;
  }
  label:hover { border-color: #555; color: #fff; }

  input[type="file"] { display: none; }

  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.75rem;
    color: #555;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 120px;
    height: 2px;
    background: #333;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: #fff;
    cursor: pointer;
  }

  button {
    background: none;
    border: 1px solid #333;
    color: #888;
    padding: 8px 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }
  button:hover { border-color: #fff; color: #fff; }
  button:disabled { opacity: 0.3; cursor: default; }

  .canvas-wrap {
    position: relative;
    border: 1px solid #1a1a1a;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  .info {
    margin-top: 20px;
    font-size: 0.75rem;
    color: #333;
    text-align: center;
    line-height: 1.8;
  }

  .color-current {
    display: inline-block;
    width: 10px;
    height: 10px;
    margin-right: 6px;
    vertical-align: middle;
  }

  .progress-bar {
    width: 300px;
    height: 1px;
    background: #111;
    margin: 16px auto 0;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: #fff;
    width: 0%;
    transition: width 0.1s;
  }

  .status {
    margin-top: 10px;
    font-size: 0.7rem;
    color: #333;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<h1>Wplace · Pixel Visualiseur</h1>

<div class="controls">
  <label>
    📂 Charger JSON
    <input type="file" id="fileInput" accept=".json">
  </label>

  <div class="slider-wrap">
    Vitesse
    <input type="range" id="speed" min="1" max="200" value="20">
    <span id="speedVal">20px/frame</span>
  </div>

  <div class="slider-wrap">
    Zoom
    <input type="range" id="zoom" min="1" max="20" value="8">
    <span id="zoomVal">×8</span>
  </div>

  <button id="btnPlay" disabled>▶ Jouer</button>
  <button id="btnReset" disabled>↺ Reset</button>
</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="info" id="info">Charge un fichier JSON généré par wplace.py</div>
<div class="status" id="status"></div>

<script>
const fileInput = document.getElementById('fileInput');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const btnPlay = document.getElementById('btnPlay');
const btnReset = document.getElementById('btnReset');
const speedSlider = document.getElementById('speed');
const speedVal = document.getElementById('speedVal');
const zoomSlider = document.getElementById('zoom');
const zoomVal = document.getElementById('zoomVal');
const info = document.getElementById('info');
const status = document.getElementById('status');
const progressFill = document.getElementById('progressFill');

// Palette Wplace → hex
const PALETTE = {
  "Noir": "#000000", "Gris foncé": "#3c3c3c", "Gris": "#787878",
  "Gris moyen": "#aaaaaa", "Gris clair": "#d2d2d2", "Blanc": "#ffffff",
  "Rouge profond": "#600018", "Rouge foncé": "#a50e1e", "Rouge": "#ed1c24",
  "Rouge clair": "#fa8072", "Orange foncé": "#e45c1a", "Orange": "#ff7f27",
  "Or": "#f6aa09", "Jaune": "#f9dd3b", "Jaune clair": "#fffabc",
  "Verge d'or foncée": "#9c8431", "Verge d'or": "#c5ad31",
  "Jaune verge d'or clair": "#e8d45f", "Olive foncée": "#4a6b3a",
  "Olive": "#5a944a", "Olive claire": "#84c573", "Vert foncé": "#0eb968",
  "Vert": "#13e67b", "Vert clair": "#87ff5e", "Sarcelle foncée": "#0c816e",
  "Sarcelle": "#10aea6", "Bleu-vert clair": "#13e1be", "Cyan foncé": "#0f799f",
  "Cyan": "#60f7f2", "Cyan clair": "#bbfaf2", "Bleu foncé": "#28509e",
  "Bleu": "#4093e4", "Bleu clair": "#7dc7ff", "Indigo foncé": "#4d31b8",
  "Indigo": "#6b50f6", "Indigo clair": "#99b1fb", "Bleu Ardoise Foncé": "#4a4284",
  "Bleu ardoise": "#7a71c4", "Bleu ardoise clair": "#b5aef1",
  "Violet foncé": "#780c99", "Violet": "#aa38b9", "Violet clair": "#e09ff9",
  "Rose foncé": "#cb007a", "Rose": "#ec1f80", "Rose clair": "#f38da9",
  "Pêche Foncé": "#9b5249", "Pêche": "#d18078", "Pêche Claire": "#fab6a4",
  "Brun foncé": "#684634", "Marron": "#95682a", "Marron clair": "#dba463",
  "Bronzage Foncé": "#7b6352", "Bronzé": "#9c846b", "Beige clair": "#d6b594",
  "Beige foncé": "#d18051", "Beige": "#f8b277", "Beige très clair": "#ffc5a5",
  "Pierre sombre": "#6d643f", "Pierre": "#948c6b", "Pierre légère": "#cdc59e",
  "Ardoise foncée": "#333941", "Ardoise": "#6d758d", "Ardoise claire": "#b3b9d1",
  "Inconnu": "#ff00ff"
};

let data = null;
let pixelList = []; // liste plate de {x, y, couleur}
let currentIndex = 0;
let animId = null;
let running = false;
let ZOOM = 8;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      data = JSON.parse(ev.target.result);
      loadData();
    } catch(err) {
      info.textContent = 'Erreur: JSON invalide';
    }
  };
  reader.readAsText(file);
});

function loadData() {
  pixelList = [];

  // Format 1: {larg, haut, pixels: [{x,y,nom}]}
  if (data.pixels && Array.isArray(data.pixels)) {
    data.pixels.forEach(p => pixelList.push({x: p.x, y: p.y, couleur: p.nom}));
  }
  // Format 2: {"Noir": [{x,y}], "Blanc": [{x,y}], ...}
  else {
    for (const [nom, pixels] of Object.entries(data)) {
      if (Array.isArray(pixels)) {
        pixels.forEach(p => pixelList.push({x: p.x, y: p.y, couleur: nom}));
      }
    }
  }

  // Calculer dimensions
  const maxX = Math.max(...pixelList.map(p => p.x));
  const maxY = Math.max(...pixelList.map(p => p.y));
  const W = data.larg || maxX + 1;
  const H = data.haut || maxY + 1;

  ZOOM = parseInt(zoomSlider.value);
  canvas.width = W * ZOOM;
  canvas.height = H * ZOOM;
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  currentIndex = 0;
  running = false;
  btnPlay.disabled = false;
  btnReset.disabled = false;
  btnPlay.textContent = '▶ Jouer';
  progressFill.style.width = '0%';
  info.textContent = `${pixelList.length} pixels · ${W}×${H}`;
  status.textContent = '';
}

function drawNext(count) {
  for (let i = 0; i < count; i++) {
    if (currentIndex >= pixelList.length) return;
    const p = pixelList[currentIndex];
    const hex = PALETTE[p.couleur] || '#ff00ff';
    ctx.fillStyle = hex;
    ctx.fillRect(p.x * ZOOM, p.y * ZOOM, ZOOM, ZOOM);
    currentIndex++;
  }
}

function animate() {
  if (!running) return;
  if (currentIndex >= pixelList.length) {
    running = false;
    btnPlay.textContent = '▶ Jouer';
    status.textContent = 'Terminé';
    return;
  }

  const speed = parseInt(speedSlider.value);
  drawNext(speed);

  const pct = (currentIndex / pixelList.length * 100).toFixed(1);
  progressFill.style.width = pct + '%';
  status.textContent = `${currentIndex} / ${pixelList.length} pixels · couleur: ${pixelList[Math.max(0,currentIndex-1)]?.couleur}`;

  animId = requestAnimationFrame(animate);
}

btnPlay.addEventListener('click', () => {
  if (!data) return;
  if (running) {
    running = false;
    cancelAnimationFrame(animId);
    btnPlay.textContent = '▶ Jouer';
  } else {
    running = true;
    btnPlay.textContent = '⏸ Pause';
    animate();
  }
});

btnReset.addEventListener('click', () => {
  running = false;
  cancelAnimationFrame(animId);
  btnPlay.textContent = '▶ Jouer';
  currentIndex = 0;
  progressFill.style.width = '0%';
  status.textContent = '';
  const W = canvas.width / ZOOM;
  const H = canvas.height / ZOOM;
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
});

speedSlider.addEventListener('input', () => {
  speedVal.textContent = speedSlider.value + 'px/frame';
});

zoomSlider.addEventListener('input', () => {
  ZOOM = parseInt(zoomSlider.value);
  zoomVal.textContent = '×' + ZOOM;
  if (data) loadData();
});
</script>
</body>
</html>
